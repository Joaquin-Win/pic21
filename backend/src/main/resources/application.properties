# ==============================
# PIC21 — application.properties (Perfil: dev/H2)
# ==============================

spring.application.name=PIC21

# ==============================
# H2 Database (In-Memory — solo desarrollo)
# ==============================
spring.datasource.url=jdbc:h2:mem:pic21db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console — SOLO para desarrollo local
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ==============================
# JPA / Hibernate (dev)
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' preserva los datos entre reinicios (a diferencia de create-drop)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==============================
# Inicialización SQL
# ==============================
# Los datos iniciales se crean programáticamente via DataInitializer.java
spring.sql.init.mode=never

# ==============================
# JWT
# ==============================
# IMPORTANTE: en producción usar variable de entorno JWT_SECRET
# Este valor por defecto es SOLO para desarrollo
app.jwt.secret=${JWT_SECRET:pic21-dev-secret-key-min-256bits-DO-NOT-USE-IN-PRODUCTION!!}
app.jwt.expiration=28800000
# 8 horas en milisegundos

# ==============================
# Servidor
# ==============================
server.port=8080

# ==============================
# Multipart — subida de archivos PDF
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================
# Jackson — serialización de fechas
# ==============================
spring.jackson.serialization.write-dates-as-timestamps=false

# ==============================
# Logging
# ==============================
logging.level.com.pic21=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ==============================
# Error handling
# NUNCA exponer stacktrace ni mensajes internos en producción
# ==============================
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
