# ==============================
# PIC21 — application-prod.properties (Perfil: producción)
# ==============================
# Activar con: SPRING_PROFILES_ACTIVE=prod
# Fly.io inyecta DATABASE_URL automáticamente al hacer `flyctl postgres attach`
# ==============================

spring.application.name=PIC21

# ==============================
# PostgreSQL — Fly.io
# Fly.io inyecta DB_URL, DB_USERNAME, DB_PASSWORD via secrets
# ==============================
spring.datasource.url=${DB_URL:jdbc:postgresql://pic21-db.flycast:5432/pic21?sslmode=disable}
spring.datasource.username=${DB_USERNAME:pic21}
spring.datasource.password=${DB_PASSWORD:zd7tx9TZE0Gcoms}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Timezone: Hibernate guarda/lee en UTC desde PostgreSQL ──────────────────
# Esto evita el desfase +3h (UTC vs America/Argentina/Buenos_Aires)
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires

# ==============================
# Inicialización SQL
# ==============================
spring.sql.init.mode=never

# ==============================
# JWT — OBLIGATORIO en producción
# ==============================
app.jwt.secret=${JWT_SECRET:pic21-prod-default-change-me!!!!!!!!!!!!!!!!!!!!!!!!!!!!!}
app.jwt.expiration=28800000

# ==============================
# Servidor
# ==============================
server.port=${PORT:8080}

# ==============================
# Logging (prod)
# ==============================
logging.level.com.pic21=INFO
logging.level.org.springframework.security=WARN
logging.level.root=WARN

# ==============================
# Error handling — nunca exponer internos
# ==============================
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# ==============================
# Multipart
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================
# Jackson — fechas en ISO 8601 UTC para que el frontend pueda convertir
# ==============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Argentina/Buenos_Aires
