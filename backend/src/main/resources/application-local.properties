# ==============================
# PIC21 — application-local.properties (Perfil: local)
# Usar con: SPRING_PROFILES_ACTIVE=local
# ==============================

spring.application.name=PIC21

# ==============================
# PostgreSQL local
# ==============================
spring.datasource.url=jdbc:postgresql://localhost:5432/pic21
spring.datasource.username=postgres
spring.datasource.password=Siglo21
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires

# ==============================
# Inicialización SQL
# ==============================
spring.sql.init.mode=never

# ==============================
# JWT
# ==============================
app.jwt.secret=pic21-local-secret-key-min-256bits-DO-NOT-USE-IN-PRODUCTION!!
app.jwt.expiration=28800000

# ==============================
# Servidor
# ==============================
server.port=8080

# ==============================
# Multipart
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================
# Jackson
# ==============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Argentina/Buenos_Aires

# ==============================
# Logging
# ==============================
logging.level.com.pic21=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ==============================
# Error handling
# ==============================
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=never
