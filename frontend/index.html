<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIC21 — Sistema de Asistencias</title>
  <meta name="description" content="Sistema de gestión de reuniones y asistencias PIC21" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <!-- ── SPA Shell ────────────────────────────────────────────── -->
  <div id="app-shell" class="hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">P</div>
          <span class="brand-name">PIC21</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Colapsar">&#8249;</button>
      </div>
      <nav id="sidebarNav" class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info" id="userInfo"></div>
        <button class="btn-logout" id="logoutBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Cerrar sesión</span>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <div class="main-wrapper">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
          </button>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-right">
          <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
            <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <div class="avatar" id="topbarAvatar"></div>
        </div>
      </header>

      <!-- Page content -->
      <main id="page-content" class="page-content"></main>
    </div>
  </div>

  <!-- ── Auth screens ─────────────────────────────────────────── -->
  <div id="auth-screen" class="auth-screen hidden"></div>

  <!-- ── Toast container ──────────────────────────────────────── -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ── Modal container ──────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- ── Scripts (in dependency order) ────────────────────────── -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/topbar.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/meetings.js"></script>
  <script src="js/pages/meeting-detail.js"></script>
  <script src="js/pages/tasks.js"></script>
  <script src="js/pages/users.js"></script>
  <!-- Chart.js CDN — debe cargarse ANTES de app.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
